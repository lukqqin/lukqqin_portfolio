<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Portfolio</title>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="theme-toggle">
    <button id="themeBtn"></button>
  </div>

  <main class="site-container">

    <!-- HERO -->
    <section class="hero">

      <div class="hero-content">

        <div class="hero-text">

          <p class="hero-label">
            MODEL · BASED IN GERMANY
          </p>

          <h1>
            POLINA L.
          </h1>

          <div class="hero-info">
            <p>173 CM | 88-63-91 | S(34-36) | 40-41 </p>
            <p>FASHION</p>
          </div>

          <button class="contact-btn" id="openModal">
            Get in Touch
        </button>

        </div>

        <div class="hero-image">
          <img src="images/model2.jpg" alt="Model Image">
        </div>

      </div>

    </section>

  </main>

  <!-- CONTACT MODAL -->

<div class="modal-overlay" id="modal">

  <div class="contact-modal">

    <button class="close-modal" id="closeModal">
      ×
    </button>

    <p class="modal-label">
      CONTACT
    </p>

    <h2>
      Let’s Connect
    </h2>

    <div class="contact-links">

      <a href="https://instagram.com/lukqqin"
         target="_blank">

         Instagram

      </a>

      <a href="mailto:lukina.work@email.com">

         Email

      </a>

    </div>

  </div>

</div>

  <script src="js/script.js"></script>

</body>
</html>

<!-- SELECTED WORK -->

<section class="selected-work">

  <div class="section-heading">

    <p class="section-label">
      PORTFOLIO
    </p>

    <h2>
      Selected Work
    </h2>

  </div>

  <div class="carousel-wrapper">

    <button class="carousel-btn prev">
      ←
    </button>

    <div class="carousel-track">

      <div class="carousel-item active">
        <img src="images/model1.jpg" alt="">
      </div>

      <div class="carousel-item">
        <img src="images/model3.jpg" alt="">
      </div>

      <div class="carousel-item">
        <img src="images/model4.jpg" alt="">
      </div>

      <div class="carousel-item">
        <img src="images/model5.jpg" alt="">
      </div>

    </div>

    <button class="carousel-btn next">
      →
    </button>

  </div>

</section>
